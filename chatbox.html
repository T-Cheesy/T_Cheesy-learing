<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chatbox-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            position: absolute;
            right: 20px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-area {
            border-top: 1px solid #e0e0e0;
            padding: 16px;
            display: flex;
            gap: 10px;
            background: white;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .blocked-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .blocked-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .blocked-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .blocked-title {
            font-size: 24px;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .blocked-message {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }

        .network-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #333;
        }

        .settings-panel {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            overflow-y: auto;
            max-height: 300px;
        }

        .settings-panel h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .settings-item {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-item label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .settings-item input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .settings-item textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-height: 80px;
            font-family: monospace;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            opacity: 0.8;
        }

        .api-key-setup {
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .api-key-setup input {
            width: 100%;
            padding: 8px 12px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .api-key-setup button {
            margin-top: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Network blocker configuration
        const BLOCKED_NETWORKS = [
            'SchoolWiFi',
            'School-Network',
            'StudentWiFi',
            'school_guest'
        ];

        const app = document.getElementById('app');
        let isBlocked = false;
        let currentNetworkSSID = 'Unknown';

        // Initialize
        async function init() {
            await checkNetwork();
            if (isBlocked) {
                showBlockedScreen();
            } else {
                showChatbox();
            }
        }

        async function checkNetwork() {
            try {
                // Check if we can detect current network (limited browser API)
                const hostname = window.location.hostname;
                
                // If hostname contains school domain, block it
                if (isSchoolNetwork(hostname)) {
                    isBlocked = true;
                    currentNetworkSSID = 'School Network';
                }
            } catch (error) {
                console.log('Network check failed:', error);
            }
        }

        function isSchoolNetwork(hostname) {
            const schoolDomains = JSON.parse(localStorage.getItem('school_domains') || '[]');
            
            if (schoolDomains.length > 0) {
                return schoolDomains.some(domain => hostname.includes(domain.toLowerCase()));
            }
            
            return false;
        }

        function showBlockedScreen() {
            app.innerHTML = `
                <div class="chatbox-container">
                    <div class="blocked-screen">
                        <div class="blocked-content">
                            <div class="blocked-icon">🚫</div>
                            <div class="blocked-title">Access Blocked</div>
                            <div class="blocked-message">
                                This chatbox is not available on school networks.
                            </div>
                            <div class="network-info">
                                <strong>Current Network:</strong> ${currentNetworkSSID}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function showChatbox() {
            app.innerHTML = `
                <div class="chatbox-container">
                    <div class="header">
                        <div class="header-title">💬 AI Chat</div>
                        <div class="header-buttons">
                            <button id="settingsBtn" class="header-btn" title="Settings">⚙️</button>
                        </div>
                    </div>
                    
                    <div id="messagesContainer" class="messages"></div>
                    
                    <div id="settingsContainer" style="display: none;"></div>
                    
                    <div class="input-area">
                        <input 
                            type="text" 
                            id="userInput" 
                            placeholder="Type your message..." 
                            autocomplete="off"
                        >
                        <button class="send-btn" id="sendBtn">➤</button>
                    </div>
                </div>
            `;

            initializeChatbox();
        }

        function initializeChatbox() {
            const messagesContainer = document.getElementById('messagesContainer');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsContainer = document.getElementById('settingsContainer');
            let apiKey = localStorage.getItem('openai_api_key') || '';

            if (!apiKey) {
                promptForApiKey();
            }

            settingsBtn.addEventListener('click', () => {
                settingsContainer.style.display = settingsContainer.style.display === 'none' ? 'block' : 'none';
                if (settingsContainer.style.display === 'block') {
                    renderSettings();
                }
            });

            function renderSettings() {
                const blockedNetworks = JSON.parse(localStorage.getItem('blocked_networks') || JSON.stringify(BLOCKED_NETWORKS));
                const schoolDomains = JSON.parse(localStorage.getItem('school_domains') || '[]');

                settingsContainer.innerHTML = `
                    <div class="settings-panel">
                        <h3>⚙️ Settings</h3>
                        
                        <div class="settings-item">
                            <label>OpenAI API Key</label>
                            <input type="password" id="apiKeyInput" placeholder="Enter your API key" value="${apiKey ? '••••••••' : ''}">
                            <small style="color: #666;">Get one at: https://platform.openai.com/api-keys</small>
                        </div>

                        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                            <h4 style="margin-bottom: 10px;">🚫 Network Blocking</h4>
                            
                            <div class="settings-item">
                                <label>Blocked WiFi Networks (one per line)</label>
                                <textarea id="blockedNetworksInput">${blockedNetworks.join('\n')}</textarea>
                            </div>

                            <div class="settings-item">
                                <label>Blocked School Domains (one per line)</label>
                                <textarea id="schoolDomainsInput">${schoolDomains.join('\n')}</textarea>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button class="btn-save" id="saveSettingsBtn">Save Settings</button>
                            <button class="btn-clear" id="clearSettingsBtn">Clear All</button>
                        </div>
                    </div>
                `;

                document.getElementById('apiKeyInput').addEventListener('change', (e) => {
                    if (e.target.value && e.target.value !== '••••••••') {
                        apiKey = e.target.value;
                    }
                });

                document.getElementById('saveSettingsBtn').addEventListener('click', () => {
                    const networks = document.getElementById('blockedNetworksInput').value
                        .split('\n')
                        .map(n => n.trim())
                        .filter(n => n);
                    const domains = document.getElementById('schoolDomainsInput').value
                        .split('\n')
                        .map(d => d.trim())
                        .filter(d => d);

                    if (apiKey && apiKey !== '••••••••') {
                        localStorage.setItem('openai_api_key', apiKey);
                    }
                    localStorage.setItem('blocked_networks', JSON.stringify(networks));
                    localStorage.setItem('school_domains', JSON.stringify(domains));
                    alert('✅ Settings saved!');
                    settingsContainer.style.display = 'none';
                });

                document.getElementById('clearSettingsBtn').addEventListener('click', () => {
                    if (confirm('⚠️ Clear all settings (API key, networks, domains)?')) {
                        localStorage.removeItem('openai_api_key');
                        localStorage.removeItem('blocked_networks');
                        localStorage.removeItem('school_domains');
                        settingsContainer.style.display = 'none';
                        alert('✅ Settings cleared!');
                        location.reload();
                    }
                });
            }

            function promptForApiKey() {
                const key = prompt(
                    'Please enter your OpenAI API key:\n\n' +
                    'Get one at: https://platform.openai.com/api-keys\n\n' +
                    '(It will be saved locally in your browser)'
                );
                if (key) {
                    apiKey = key;
                    localStorage.setItem('openai_api_key', key);
                }
            }

            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = text;
                
                messageDiv.appendChild(contentDiv);
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function showLoadingIndicator() {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message ai';
                messageDiv.id = 'loadingIndicator';
                
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'loading';
                loadingDiv.innerHTML = '<span></span><span></span><span></span>';
                
                messageDiv.appendChild(loadingDiv);
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function removeLoadingIndicator() {
                const loading = document.getElementById('loadingIndicator');
                if (loading) {
                    loading.remove();
                }
            }

            async function sendMessage() {
                const message = userInput.value.trim();
                if (!message) return;

                if (!apiKey) {
                    promptForApiKey();
                    if (!apiKey) return;
                }

                addMessage(message, 'user');
                userInput.value = '';
                sendBtn.disabled = true;

                showLoadingIndicator();

                try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [
                                {
                                    role: 'user',
                                    content: message
                                }
                            ],
                            temperature: 0.7,
                            max_tokens: 2000
                        })
                    });

                    removeLoadingIndicator();

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const aiMessage = data.choices[0].message.content;
                    addMessage(aiMessage, 'ai');
                } catch (error) {
                    removeLoadingIndicator();
                    addMessage(`❌ Error: ${error.message}`, 'ai');
                    if (error.message.includes('401')) {
                        localStorage.removeItem('openai_api_key');
                        apiKey = '';
                        addMessage('API key invalid. Please update it in settings.', 'ai');
                    }
                } finally {
                    sendBtn.disabled = false;
                    userInput.focus();
                }
            }

            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            userInput.focus();
        }

        init();
    </script>
</body>
</html>
